[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "22"
  # BLUESKY_HANDLE is a public Bluesky username — not a secret. Its value appears
  # in ROADMAP.md and .env.example intentionally. Omit it from secret scanning.
  SECRETS_SCAN_OMIT_KEYS = "BLUESKY_HANDLE"
