<!doctype html>
<html lang="en-CA">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<!-- No global meta description here on purpose: every route sets its own in
		     its page head. A site-wide tag in this file would render first and take
		     precedence over the per-page descriptions search engines should use. -->
		<meta property="og:site_name" content="FillTheHole.ca" />
		<meta property="og:locale" content="en_CA" />
		<link rel="icon" href="/favicon.png" type="image/png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#191714" media="(prefers-color-scheme: dark)" />
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "WebSite",
			"name": "FillTheHole.ca",
			"url": "https://fillthehole.ca",
			"description": "Track potholes in Kitchener, Waterloo, and Cambridge. Report, confirm, and hold the city accountable.",
			"inLanguage": "en-CA"
		}
		</script>
		<script nonce="%sveltekit.nonce%">
			// Svelte 5 caches Node.prototype.firstChild/.nextSibling getters at startup via
			// Object.getOwnPropertyDescriptor. On certain iOS Safari versions the descriptor is a
			// data descriptor (no .get), leaving the cache undefined and crashing hydration. Walk
			// the prototype chain to find and re-seat the real getter before the bundle loads.
			(function () {
				if (typeof Node === 'undefined') return;
				['firstChild', 'nextSibling'].forEach(function (prop) {
					var proto = Node.prototype;
					var d = Object.getOwnPropertyDescriptor(proto, prop);
					if (d && !d.get) {
						var p = Object.getPrototypeOf(proto);
						while (p) {
							var pd = Object.getOwnPropertyDescriptor(p, prop);
							if (pd && pd.get) {
								Object.defineProperty(proto, prop, { get: pd.get, configurable: true, enumerable: false });
								break;
							}
							p = Object.getPrototypeOf(p);
						}
					}
				});
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="min-h-screen">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
